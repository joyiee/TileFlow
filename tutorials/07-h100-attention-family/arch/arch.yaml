            meshY: 8
            word-bits: 16
            block-size: 32
            sizeKB: 228
            read_bandwidth: 64
            write_bandwidth: 64
        subtree:
        - name: PE
          local:
          - name: RegFile[0..524287]
            class: regfile
            attributes:
              meshX: 1024
              meshY: 512
              depth: 32
              block-size: 4
              word-bits: 16
              read_bandwidth: 2
              write_bandwidth: 2
          - name: mac[0..524287]
