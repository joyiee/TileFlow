architecture:
  version: 0.2

  subtree:
  - name: GPU
    local:
    - name: HBM
      class: DRAM
      attributes:
        word-bits: 16
        block-size: 32
        sizeKB: 40960000
        read_bandwidth: 560
        write_bandwidth: 560
    subtree:
    - name: L2
      local:
      - name: L2Cache
        class: SRAM
        attributes:
          word-bits: 16
          block-size: 32
          sizeKB: 40960
          read_bandwidth: 2600
          write_bandwidth: 900
      subtree:
      - name: SM
        local:
        - name: SharedMemory[0..127]
          class: SRAM
          attributes:
            meshX: 16
            meshY: 8
            word-bits: 16
            block-size: 32
            sizeKB: 164
            read_bandwidth: 48
            write_bandwidth: 48
        subtree:
        - name: PE
          local:
          - name: RegFile[0..524287]
            class: regfile
            attributes:
              meshX: 1024
              meshY: 512
              depth: 32
              block-size: 4
              word-bits: 16
              read_bandwidth: 2
              write_bandwidth: 2
          - name: mac[0..524287]
            class: intmac
            attributes:
              meshX: 1024
              meshY: 512
              word-bits: 16
